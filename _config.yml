## => Site Settings (jekyll-TeXt-theme)
##############################
text_skin: default # "default", "dark", "forest", "ocean", "chocolate", "orange"
highlight_theme: default
url     : "https://wooix.github.io" # 사이트 호스트 (프로토콜 포함)
baseurl : "/blog"                   # 저장소 이름이 wooix/blog 이므로 /blog 하위에서 서빙됨
title   : wooix tech blog
description: >-
  wooix의 기술 블로그 — LLM, 트랜스포머, CME 295 강의·논문 노트를 정리합니다.

## => Language and Timezone
##############################
lang: ko
timezone: Asia/Seoul

## => Author and Social
##############################
author:
  type      : person
  name      : wooix
  email     : wooix.pak@gmail.com
  github    : wooix

## => GitHub Repository
##############################
repository: wooix/blog
repository_tree: main

## => Paths
##############################
paths:
  root    : # "/" (default)
  home    : # "/" (default)
  archive : # "/archive.html" (default)
  rss     : # "/feed.xml" (default)

## => Post
##############################
excerpt_separator: <!--more-->
license: CC-BY-NC-4.0
toc:
  selectors: # "h1,h2,h3" (default)

## => Markdown Enhancements
##############################
mathjax: true
mathjax_autoNumber: false
mermaid: false
chart: false

## => Paginate
##############################
paginate: 8
paginate_path: /page:num

## => Sources
##############################
sources: unpkg # bootcdn (default), unpkg

## => Sharing / Comments / Pageview / Analytics
##############################
sharing:
  provider: false
comments:
  provider: false
pageview:
  provider: false
analytics:
  provider: false

## => Search
##############################
search:
  provider: default

## => Build
##############################
markdown    : kramdown
highlighter : rouge
permalink   : date

remote_theme: kitian616/jekyll-TeXt-theme

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
  - jekyll-remote-theme # remote_theme 동작에 필요

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor
  - node_modules

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      sharing: false
      license: true
      aside:
        toc: true
      show_edit_on_github: false
      show_subscribe: false
      pageview: false
